<!--
  HTML Table Snippet for Marp Slides

  CRITICAL REQUIREMENTS for full-width tables with column control:

  1. Theme CSS MUST override github-markdown-css defaults:
     - `display: table !important;`  (github-markdown-css sets display:block)
     - `width: 100% !important;`     (github-markdown-css sets width:max-content)
     All themes include these overrides.

  2. Theme CSS must have `table-layout: fixed` for col widths to work
     (all themes include this)

  3. Do NOT use `<table width="100%">` HTML attribute - CSS handles it

  4. Use CSS classes (w-30, w-40, etc.) on <col> tags, NOT inline styles
     Marp sanitizes inline styles in <col> tags!

  Available width classes in corporate/minimal/colorful themes:
  w-20, w-25, w-30, w-35, w-40, w-50, w-60, w-65, w-70, w-75, w-80

  Usage: Copy and adapt this template for tables in slides.
-->

<!-- Basic 2-Column Table (35% / 65%) -->
<table>
  <colgroup>
    <col class="w-35">
    <col class="w-65">
  </colgroup>
  <thead>
    <tr>
      <th>項目</th>
      <th>詳細</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>内容A</td>
      <td><strong>強調値</strong></td>
    </tr>
    <tr>
      <td>内容B</td>
      <td><strong>強調値</strong></td>
    </tr>
    <tr>
      <td>内容C</td>
      <td><strong>強調値</strong></td>
    </tr>
  </tbody>
</table>
