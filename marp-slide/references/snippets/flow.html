<!-- Flow Diagram Component -->
<!-- Use for: プロセスフロー、ステップバイステップ、導入手順 -->
<!-- Requires: .flow-container, .flow-step, .flow-arrow styles from theme CSS -->

<!-- 3 Steps Layout (Standard) -->
<div class="flow-container">
  <div class="flow-step">
    <div class="number">1</div>
    <div class="title">データ収集</div>
    <div class="desc">入退室ログ取得</div>
  </div>
  <div class="flow-arrow">→</div>
  <div class="flow-step">
    <div class="number">2</div>
    <div class="title">自動連携</div>
    <div class="desc">API経由で統合</div>
  </div>
  <div class="flow-arrow">→</div>
  <div class="flow-step">
    <div class="number">3</div>
    <div class="title">分析</div>
    <div class="desc">BigQueryで可視化</div>
  </div>
</div>
