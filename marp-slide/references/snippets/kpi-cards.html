<!-- KPI Cards: 定量的成果・数値指標表示 -->
<!-- Classes: w-20〜w-80 for width adjustment -->

<div class="kpi-container">
  <div class="kpi-card">
    <div class="number">96%</div>
    <div class="label">作業時間削減</div>
    <div class="change">↑ 大幅改善</div>
  </div>
  <div class="kpi-card">
    <div class="number">¥500万</div>
    <div class="label">年間コスト削減</div>
    <div class="change">ROI 300%</div>
  </div>
  <div class="kpi-card">
    <div class="number">2週間</div>
    <div class="label">導入期間</div>
    <div class="change">スピード導入</div>
  </div>
</div>

<!-- Negative: <div class="change negative">↓ 30%減</div> -->
