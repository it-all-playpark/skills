# Receipt Fetch Configuration
# Copy to: ~/.config/receipt-fetch/config.yaml

# Output directory for downloaded receipts
output_dir: ~/Documents/receipts

# Service configurations
services:
  # MoneyForward - 会計/経費精算
  moneyforward:
    enabled: true
    op_item: "MoneyForward Login"  # 1Password item name
    totp: true
    fallback:
      ai_prompt: "経費精算の請求書一覧ページに移動し、当月の請求書PDFをすべてダウンロード"

  # JR East - えきねっと
  jr-east:
    enabled: true
    op_item: "えきねっと Login"
    totp: false
    fallback:
      ai_prompt: "購入履歴ページで当月の領収書をダウンロード"

  # Amazon Japan
  amazon:
    enabled: true
    op_item: "Amazon Japan"
    totp: true
    fallback:
      ai_prompt: "注文履歴から当月の注文の領収書/請求書をダウンロード"
