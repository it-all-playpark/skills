name: lint

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  subagent-dispatch-lint:
    name: Subagent Dispatch Rules Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run subagent-dispatch-lint.sh
        shell: bash
        run: |
          chmod +x tests/subagent-dispatch-lint.sh
          ./tests/subagent-dispatch-lint.sh

  bats-tests:
    name: Bats Tests (issue #93 helpers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats + jq
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq

      - name: Run tests/run-all-bats.sh --strict
        shell: bash
        run: |
          chmod +x tests/run-all-bats.sh
          ./tests/run-all-bats.sh --strict

  node-tests:
    name: Node Unit Tests (workflow arg resolver)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run tests/run-node-tests.sh --strict
        shell: bash
        run: |
          chmod +x tests/run-node-tests.sh
          ./tests/run-node-tests.sh --strict
